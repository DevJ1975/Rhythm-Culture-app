<ion-content class="ion-padding" fullscreen>
  <div class="flex flex-col min-h-full">
    <div class="flex items-center pt-8 pb-8">
      <ion-button fill="clear" routerLink="/auth/login">
        <ion-icon name="chevron-back-outline" slot="icon-only" class="text-white"></ion-icon>
      </ion-button>
    </div>

    <div class="flex-1 px-4">
      <ng-container *ngIf="!emailSent; else successState">
        <h2 class="text-white font-bold text-2xl mb-2">Reset Password</h2>
        <p class="text-gray-500 mb-8">Enter your email and we'll send you a reset link.</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
          <div class="relative">
            <ion-icon name="mail-outline" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 z-10"></ion-icon>
            <ion-input
              formControlName="email"
              type="email"
              placeholder="Email address"
              class="input-field pl-11"
            ></ion-input>
          </div>

          <ion-button
            expand="block"
            type="submit"
            [disabled]="form.invalid || isLoading"
            class="h-14 font-bold"
            style="--background: #0066FF; --border-radius: 14px;"
          >
            <ion-spinner *ngIf="isLoading" name="crescent" class="mr-2"></ion-spinner>
            Send Reset Link
          </ion-button>
        </form>
      </ng-container>

      <ng-template #successState>
        <div class="flex flex-col items-center text-center py-12">
          <ion-icon name="checkmark-circle-outline" class="text-green-400 mb-6" style="font-size: 80px;"></ion-icon>
          <h3 class="text-white font-bold text-2xl mb-3">Check your email</h3>
          <p class="text-gray-500">We've sent a password reset link to <strong class="text-white">{{ form.value.email }}</strong></p>
          <ion-button fill="clear" routerLink="/auth/login" class="text-primary-400 mt-8">Back to Login</ion-button>
        </div>
      </ng-template>
    </div>
  </div>
</ion-content>
