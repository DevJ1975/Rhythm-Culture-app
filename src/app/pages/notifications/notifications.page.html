<ion-header>
  <ion-toolbar>
    <ion-title>Notifications</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="markAllRead()">
        <ion-icon name="checkmark-done-outline" class="text-primary-400"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>

  <!-- Empty state -->
  <div *ngIf="!isLoading && notifications.length === 0" class="flex flex-col items-center py-16">
    <div class="w-16 h-16 rounded-full bg-dark-200 flex items-center justify-center mb-4">
      <ion-icon name="notifications-outline" class="text-gray-600 text-3xl"></ion-icon>
    </div>
    <h3 class="text-white font-bold mb-2">All caught up!</h3>
    <p class="text-gray-500 text-sm text-center max-w-xs">Likes, comments, follows and more will appear here.</p>
  </div>

  <ion-list lines="none" *ngIf="notifications.length > 0">
    <ion-item
      *ngFor="let notif of notifications"
      (click)="markRead(notif)"
      detail="false"
      class="cursor-pointer transition-colors"
      [class]="!notif.isRead ? 'bg-primary-500 bg-opacity-5' : ''"
    >
      <!-- Sender avatar -->
      <div slot="start" class="relative">
        <ion-avatar class="w-11 h-11">
          <img [src]="notif.senderPhotoURL || 'assets/images/default-avatar.png'" class="w-full h-full object-cover" />
        </ion-avatar>
        <div class="absolute -bottom-0.5 -right-0.5 w-5 h-5 rounded-full bg-dark-DEFAULT flex items-center justify-center">
          <ion-icon [name]="getIcon(notif.type)" [class]="getIconColor(notif.type)" class="text-xs"></ion-icon>
        </div>
      </div>

      <ion-label>
        <p class="text-white text-sm leading-snug m-0">
          <span class="font-semibold">{{ notif.senderName }}</span>
          {{ notif.body }}
        </p>
        <p class="text-gray-500 text-xs mt-0.5 m-0">{{ formatTime(notif.createdAt) }}</p>
      </ion-label>

      <!-- Unread dot -->
      <div *ngIf="!notif.isRead" slot="end"
           class="w-2 h-2 rounded-full bg-primary-500 flex-shrink-0"></div>
    </ion-item>
  </ion-list>

</ion-content>
